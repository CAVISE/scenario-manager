description: |-
  Base Scenario

world:
  sync_mode: true
  fixed_delta_seconds: 0.05
  client_port: 2000
  seed: 42
  weather:
    cloudiness: 80
    precipitation: 70
    precipitation_deposits: 80
    sun_altitude_angle: 60
    wind_intensity: 0
    fog_density: 80
    fog_distance: 0
    fog_falloff: 80
    wetness: 0

vehicle_base:
  sensing:
    perception:
      activate: false
      camera:
        visualize: 1
        num: 1
        positions:
          - [2.5, 0, 1.0, 0]
      lidar:
        visualize: true
        channels: 32
        range: 50
        points_per_second: 100000
        rotation_frequency: 20
        upper_fov: 10.0
        lower_fov: -30.0
        dropoff_general_rate: 0.0
        dropoff_intensity_limit: 1.0
        dropoff_zero_intensity: 0.0
        noise_stddev: 0.0
    localization:
      activate: false
      dt: ${world.fixed_delta_seconds}
      gnss:
        noise_alt_stddev: 0.001
        noise_lat_stddev: 1.0e-6
        noise_lon_stddev: 1.0e-6
        heading_direction_stddev: 0.1
        speed_stddev: 0.2
      debug_helper:
        show_animation: false
        x_scale: 1.0
        y_scale: 100.0

  map_manager:
    pixels_per_meter: 2
    raster_size: [224, 224]
    lane_sample_resolution: 0.1
    visualize: true
    activate: true

  safety_manager:
    print_message: true
    collision_sensor:
      history_size: 30
      col_thresh: 1
    stuck_dector:
      len_thresh: 500
      speed_thresh: 0.5
    offroad_dector: []
    traffic_light_detector:
      light_dist_thresh: 20

  behavior:
    max_speed: 111
    tailgate_speed: 121
    speed_lim_dist: 3
    speed_decrease: 15
    safety_time: 4
    emergency_param: 0.4
    ignore_traffic_light: true
    overtake_allowed: true
    collision_time_ahead: 1.5
    overtake_counter_recover: 35
    sample_resolution: 4.5
    local_planner:
      buffer_size: 12
      trajectory_update_freq: 15
      waypoint_update_freq: 9
      min_dist: 3
      trajectory_dt: 0.20
      debug: false
      debug_trajectory: false

  controller:
    type: pid_controller
    args:
      lat:
        k_p: 0.75
        k_d: 0.02
        k_i: 0.4
      lon:
        k_p: 0.37
        k_d: 0.024
        k_i: 0.032
      dynamic: false
      dt: ${world.fixed_delta_seconds}
      max_brake: 1.0
      max_throttle: 1.0
      max_steering: 0.3
  v2x:
    enabled: true
    communication_range: 35

carla_traffic_manager:
  sync_mode: true
  global_distance: 5
  global_speed_perc: -100
  set_osm_mode: true
  auto_lane_change: false
  ignore_lights_percentage: 0
  random: false
  vehicle_list: []
  range: []

traffic_manager:
  global_distance_to_leading_vehicle: 5.0
  synchronous_mode: true
