version: '3.8'

services:

  redis:
    image: redis:latest
    ports:
      - "6369:6379"
    networks:
      - cavise
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "1234:1234"
    volumes:
      - .:/app            
    environment:
      - REDIS_URL=redis://redis:6379
    networks:
      - cavise
    depends_on:
      - redis
    restart: unless-stopped

  frontend-dev:
    profiles: [dev]
    build:
      context: .
      dockerfile: Dockerfile.frontend
      target: development
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - VITE_API_URL=http://localhost:1234
    networks:
      - cavise
    restart: unless-stopped

  frontend-prod:
    profiles: [prod]
    build:
      context: .
      dockerfile: Dockerfile.frontend
      target: production
    ports:
      - "80:80"
    networks:
      - cavise
    restart: unless-stopped


networks:
  cavise: