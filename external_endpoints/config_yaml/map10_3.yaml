description: |-
  РАБОЧИЙ СЦЕНАРИЙ
  успешный сценарий движения одного автопилота из точки А в точку Б
  хоть и указан background_vehicles, но их нет


world:
  sync_mode: true
  fixed_delta_seconds: 0.05
  seed: 42
  weather:
    cloudiness: 20
    precipitation: 0
    sun_altitude_angle: 60

scenario:
  name: "simple_verification"
  map: "Town10"
  single_cav_list:
    - name: cav1
      spawn_position: [-35, 138, 0.3, 0, 0, 0]
      destination: [107.0, -12.0, 0.3, 0, 0, 0]
      v2x:
        communication_range: 45
      behavior:
        local_planner:
          debug_trajectory: true
          debug: true

traffic_manager:
  global_distance_to_leading_vehicle: 5.0
  synchronous_mode: true

background_vehicles:
  number: 10
  autopilot: true
