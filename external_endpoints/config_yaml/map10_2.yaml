description: |-
  НЕ рабочий сценарий
  первая попытка сделать рабочий сценарий с параметрами мира и автопилотом
  так и не включился


world:
  sync_mode: true
  fixed_delta_seconds: 0.05
  seed: 42
  weather:
    cloudiness: 20
    precipitation: 0
    sun_altitude_angle: 60

scenario:
  name: "simple_verification"
  map: "Town10HD"

vehicles:
  - id: ego_vehicle
    spawn_position:
      x: -5.0
      y: -20.0
      z: 0.3
      yaw: 90
    sensors:
      - type: camera.rgb
        id: front_camera
        spawn_position:
          x: 1.5
          y: 0.0
          z: 2.4
          pitch: -15
          yaw: 0
          roll: 0
        attributes:
          image_size_x: 800
          image_size_y: 600
          fov: 90

traffic_manager:
  global_distance_to_leading_vehicle: 5.0
  synchronous_mode: true

background_vehicles:
  number: 10
  autopilot: true
