description: |-
  РАБОЧИЙ СЦЕНАРИЙ
  успешный(практически) сценарий движения трех автопилотов из точки А в точку Б
  хоть и указан background_vehicles, но их нет

world:
  sync_mode: true
  fixed_delta_seconds: 0.05
  seed: 42
  weather:
    cloudiness: 20
    precipitation: 0
    sun_altitude_angle: 60

scenario:
  name: "multi_actor_scenario"
  map: "Town10HD"
  single_cav_list:
    - name: cav1
      spawn_position: [-35, 138, 0.3, 0, 0, 0]
      destination: [107.0, -12.0, 0.3, 0, 0, 0]
      v2x:
        communication_range: 45
      behavior:
        local_planner:
          debug_trajectory: true
          debug: true
    - name: cav2
      spawn_position: [-67.25457000732422, 27.96375846862793, 0.3, 0, 0, 0]
      destination: [99.38441467285156, -6.305729389190674, 0.3, 0, 0, 0]
      v2x:
        communication_range: 45
      behavior:
        local_planner:
          debug_trajectory: true
          debug: true
    - name: cav3
      spawn_position: [-110.9637451171875, 59.68935775756836, 0.3, 0, 0, 0]
      destination: [45.76567459106445, 137.4599609375, 0.3, 0, 0, 0]
      v2x:
        communication_range: 45
      behavior:
        local_planner:
          debug_trajectory: true
