version: "3.8"

services:

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "1234:1234"
    networks:
      - cavise
    restart: unless-stopped
    command: >
      sh -c "python main.py --host 0.0.0.0 --port 1234"

  frontend-prod:
    profiles: [prod]
    build:
      context: .
      dockerfile: Dockerfile.frontend
      target: production
    ports:
      - "80:80"
    networks:
      - cavise
    depends_on:
      - backend
    restart: unless-stopped

networks:
  cavise:
    driver: bridge